{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>{% block title %}Unieuro{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    {% block extra_head %}
    {% endblock %}
</head>
<body class="bg-white text-gray-800">

    <!-- Botão fixo -->
   <a href="{% url 'formulario:pagina_inicial' %}"
   class="fixed top-5 right-4 bg-white text-[#003366] px-3 py-1.5 rounded-lg shadow-md hover:bg-gray-100 transition flex items-center gap-2 z-50">
    <i class="bi bi-arrow-left"></i>
    Voltar
</a>

    <!-- Header compacto -->
    <header class="w-full px-4 pt-4 pb-2 relative flex items-center">
        
        <!-- Logo -->
        <div class="pl-1">
            <img src="{% static 'img/logo.png' %}" class="h-auto max-w-[160px] md:max-w-[200px]" alt="Logo da Unieuro">
        </div>

        <!-- Título central -->
        <div class="absolute left-1/2 transform -translate-x-1/2">
            <span class="text-sm md:text-base font-medium text-[#003366]">
                Clínica Psicológica
            </span>
        </div>

    </header>

    {% block content %}
    {% endblock %}

    <footer class="text-center py-8">
        <p class="text-sm text-gray-500">
            © 2023 Clínica de Psicologia. Todos os direitos reservados.
        </p>
    </footer>
    
    {% block scripts %}
    {% endblock %}

</body>
</html>
